<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian &mdash; Billing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <svg viewBox="0 0 40 24" xmlns="http://www.w3.org/2000/svg"><polyline points="0,14 10,14 14,4 19,20 23,14 40,14" fill="none" stroke="#0E7C86" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>MERIDIAN</span>
    </div>
    <nav class="navlist" id="navlist">
      <a class="navlink" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Dashboard</a>
      <a class="navlink" href="patients.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-4 3-6.5 7-6.5s7 2.5 7 6.5"/></svg>Patients</a>
      <a class="navlink" href="doctors.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3v4a3 3 0 0 0 6 0V3"/><path d="M6 21v-4a6 6 0 0 1 12 0v4"/><circle cx="17" cy="9" r="1.2"/></svg>Doctors</a>
      <a class="navlink" href="appointments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="1.5"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>Appointments</a>
      <a class="navlink active" href="billing.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="1.5"/><path d="M8 9h8M8 13h8M8 17h4"/></svg>Billing</a>
      <a class="navlink" href="departments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21V9l8-6 8 6v12"/><path d="M9 21v-6h6v6"/></svg>Departments</a>
    </nav>
    <div class="side-foot"><span>v1.0 demo</span><span id="side-clock">--:--</span></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input placeholder="Search patients, doctors, records..." id="global-search">
      </div>
      <div class="userchip">
        <div class="avatar" id="user-initials">AD</div>
        <div class="who"><b id="user-name">Admin User</b><span id="user-role">ADMINISTRATOR</span></div>
        <a class="logout" href="index.html">Sign out</a>
      </div>
    </div>

    <section class="section active" id="sec-billing">
      <div class="sec-head">
        <div><h2>Billing</h2><p>Generate invoices and track payment status.</p></div>
        <button class="btn" onclick="openModal('bill')">+ Generate Bill</button>
      </div>
      <table>
        <thead><tr><th>Invoice #</th><th>Patient</th><th>Service</th><th>Amount</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="bills-tbody"></tbody>
      </table>
    </section>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="modal-title">Add</h3>
      <div class="modal-close" onclick="closeModal()">&#10005;</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast">Saved.</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
